name: ci

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Data.JsonDB.slnx

      - name: Build
        run: dotnet build Data.JsonDB.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Data.JsonDB.slnx --configuration Release --no-build --logger trx --results-directory artifacts/test-results

      - name: Pack
        shell: pwsh
        run: |
          $version = if ("${{ github.ref_type }}" -eq "tag" -and "${{ github.ref_name }}".StartsWith("v")) {
            "${{ github.ref_name }}".Substring(1)
          } else {
            "0.0.0-ci.${{ github.run_number }}"
          }

          dotnet pack src/IoTSharp.Data.JsonDB/IoTSharp.Data.JsonDB.csproj `
            --configuration Release `
            --no-build `
            --output artifacts/packages `
            /p:PackageVersion=$version

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/packages/*

      - name: Publish to NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          Get-ChildItem artifacts/packages -Filter *.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          }

          Get-ChildItem artifacts/packages -Filter *.snupkg | ForEach-Object {
            dotnet nuget push $_.FullName --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          }
